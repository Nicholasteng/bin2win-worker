<!DOCTYPE html>
<html>
<head>
    <title>Worker QR Code - Bin2Win</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .qr-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 20px;
        }
        .url-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-size: 14px;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin: 20px 0;
        }
        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        button:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h2>🔐 Worker QR Code</h2>
        <p class="subtitle">Scan with phone camera to access</p>
        
        <div id="qrcode"></div>
        
        <div class="url-box" id="urlDisplay">
            Generating URL...
        </div>
        
        <div class="warning">
            ⚠️ 用手机相机直接扫描<br>
            或长按二维码识别
        </div>
        
        <button onclick="generateNewQR()">🔄 Generate New QR</button>
    </div>

    <script>
        function getBaseUrl() {
            // 获取当前页面的基础URL
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
            return baseUrl;
        }

        function generateToken() {
            return 'WORKER-' + Date.now() + '-' + Math.random().toString(36).substring(2, 10).toUpperCase();
        }

        function generateQRCode() {
            document.getElementById('qrcode').innerHTML = '';
            
            const token = generateToken();
            const baseUrl = getBaseUrl();
            
            // 生成worker verify页面的完整URL
            const verifyUrl = baseUrl + 'worker-verify.html?token=' + token;
            
            // 显示URL
            document.getElementById('urlDisplay').innerHTML = '🔗 ' + verifyUrl;
            
            // 创建QR码
            new QRCode(document.getElementById('qrcode'), {
                text: verifyUrl,
                width: 250,
                height: 250
            });
            
            console.log('Generated URL:', verifyUrl);
        }

        function generateNewQR() {
            generateQRCode();
        }

        window.onload = function() {
            generateQRCode();
        };
    </script>
</body>
</html>
