<!DOCTYPE html>
<html>
<head>
    <title>Worker Verification - Bin2Win</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .verify-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }
        .token-info {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #475569;
            text-align: center;
            word-break: break-all;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .error {
            color: #ef4444;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h2>🔐 Worker Verification</h2>
        <p class="subtitle">Please enter your credentials</p>
        
        <div class="token-info" id="tokenDisplay">
            Loading token...
        </div>
        
        <div class="input-group">
            <label>👤 Worker ID</label>
            <input type="text" id="workerId" placeholder="Enter worker ID" value="WORKER001">
        </div>
        
        <div class="input-group">
            <label>🔑 Access Code</label>
            <input type="password" id="password" placeholder="Enter access code" value="bin2win2024">
        </div>
        
        <div class="input-group">
            <label>🏢 Location</label>
            <select id="location">
                <option value="main">Main Campus</option>
                <option value="north">North Wing</option>
                <option value="south">South Wing</option>
                <option value="east">East Wing</option>
            </select>
        </div>
        
        <button onclick="verifyWorker()">✅ Verify & Continue</button>
        
        <div id="errorMsg" class="error"></div>
        
        <div class="note">
            <strong>📝 Test Accounts:</strong><br>
            WORKER001 / bin2win2024<br>
            WORKER002 / recycle123<br>
            WORKER003 / green2024<br>
            STAFF001 / admin123
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || 'TEST-' + Date.now();

        // Display token
        document.getElementById('tokenDisplay').innerHTML = `
            <strong>Token:</strong> ${token}<br>
            <small>${token.includes('TEST') ? 'Test Mode' : 'Valid QR Token'}</small>
        `;

        function verifyWorker() {
            const workerId = document.getElementById('workerId').value.trim();
            const password = document.getElementById('password').value.trim();
            const location = document.getElementById('location').value;
            
            document.getElementById('errorMsg').textContent = '';

            if (!workerId || !password) {
                document.getElementById('errorMsg').textContent = '❌ Please enter all fields';
                return;
            }

            // Valid workers
            const validWorkers = [
                { id: 'WORKER001', pass: 'bin2win2024' },
                { id: 'WORKER002', pass: 'recycle123' },
                { id: 'WORKER003', pass: 'green2024' },
                { id: 'WORKER004', pass: 'recycle456' },
                { id: 'STAFF001', pass: 'admin123' }
            ];

            const isValid = validWorkers.some(w => w.id === workerId && w.pass === password);

            if (isValid) {
                // 获取当前页面的路径
                const path = window.location.pathname;
                const basePath = path.substring(0, path.lastIndexOf('/') + 1);
                const baseUrl = window.location.origin + basePath;
                
                // 构建recycling-form的完整URL
                const formUrl = baseUrl + 'recycling-form.html?worker=' + encodeURIComponent(workerId) + '&token=' + encodeURIComponent(token) + '&location=' + encodeURIComponent(location);
                
                console.log('Redirecting to:', formUrl);
                
                // 跳转到recycling-form
                window.location.href = formUrl;
            } else {
                document.getElementById('errorMsg').textContent = '❌ Invalid Worker ID or Access Code';
            }
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyWorker();
            }
        });
    </script>
</body>
</html>
