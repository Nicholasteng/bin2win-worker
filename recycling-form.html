<!DOCTYPE html>
<html>
<head>
    <title>Recycling Form - Bin2Win</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-label {
            color: #64748b;
        }
        .info-value {
            color: #1e293b;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2ecc71;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .submit-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
        .logout {
            text-align: center;
            margin-top: 20px;
        }
        .logout a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .logout a:hover {
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>♻️ Recycling Form</h2>
        <p class="subtitle">Fill in the recycling details</p>
        
        <div class="info-box" id="workerInfo">
            Loading worker information...
        </div>
        
        <div id="successMessage" class="success-message">
            ✅ Recycling record submitted successfully!
        </div>
        
        <form id="recyclingForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label>Student/Staff ID</label>
                <input type="text" id="userId" placeholder="Enter user ID" required>
            </div>
            
            <div class="form-group">
                <label>Item Type</label>
                <select id="itemType" required>
                    <option value="">Select item type</option>
                    <option value="plastic">Plastic Bottle</option>
                    <option value="glass">Glass Bottle</option>
                    <option value="paper">Paper/Cardboard</option>
                    <option value="can">Aluminum Can</option>
                    <option value="electronic">Electronics</option>
                    <option value="battery">Battery</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" step="0.1" min="0" placeholder="Enter weight" required>
            </div>
            
            <div class="form-group">
                <label>Condition</label>
                <select id="condition" required>
                    <option value="">Select condition</option>
                    <option value="clean">Clean - Ready to recycle</option>
                    <option value="sorted">Sorted - Separated by type</option>
                    <option value="mixed">Mixed - Needs sorting</option>
                    <option value="damaged">Damaged - Special handling</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Points to Award</label>
                <input type="number" id="points" step="10" min="0" value="100" required>
            </div>
            
            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="notes" placeholder="Any additional notes..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">✅ Submit Recycling Record</button>
        </form>
        
        <div class="logout">
            <a href="#" onclick="goBack()">← Back to Scanner</a>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const workerId = urlParams.get('worker');
        const token = urlParams.get('token');
        const location = urlParams.get('location') || 'main';

        // Check access
        if (!workerId || !token) {
            alert('Unauthorized access! Please scan QR code first.');
            window.location.href = 'worker-verify.html';
        }

        // Display worker info
        document.getElementById('workerInfo').innerHTML = `
            <div class="info-row">
                <span class="info-label">Worker:</span>
                <span class="info-value">${workerId}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Location:</span>
                <span class="info-value">${location}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Date/Time:</span>
                <span class="info-value">${new Date().toLocaleString()}</span>
            </div>
        `;

        function goBack() {
            window.location.href = 'worker-verify.html';
        }

        function submitForm(event) {
            event.preventDefault();
            
            const formData = {
                workerId: workerId,
                token: token,
                location: location,
                userId: document.getElementById('userId').value,
                itemType: document.getElementById('itemType').value,
                weight: document.getElementById('weight').value,
                condition: document.getElementById('condition').value,
                points: document.getElementById('points').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date().toISOString()
            };
            
            console.log('Form submitted:', formData);
            
            // Show success message
            document.getElementById('successMessage').style.display = 'block';
            
            // Reset form
            document.getElementById('recyclingForm').reset();
            
            // Hide success message after 3 seconds
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
            
            // Here you would send to server:
            // fetch('/api/submit', {
            //     method: 'POST',
            //     headers: {'Content-Type': 'application/json'},
            //     body: JSON.stringify(formData)
            // });
        }
    </script>
</body>
</html>
